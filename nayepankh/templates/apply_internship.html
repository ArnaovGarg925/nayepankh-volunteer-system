{% extends 'base.html' %}
{% block title %}Apply for Internship - NayePankh{% endblock %}
{% block content %}
<div class="auth-wrapper d-flex align-items-center justify-content-center py-5">
    <div class="auth-card p-5" style="max-width:560px;width:100%">
        <h4 class="mb-1"><i class="bi bi-briefcase text-warning me-2"></i>Internship Application</h4>
        <p class="text-muted mb-4">Fill in your details to apply for an internship at NayePankh</p>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Domain / Area of Interest *</label>
                <select name="domain" class="form-select" required>
                    <option value="">Select domain...</option>
                    {% for d in ['Education', 'Healthcare', 'Environment', 'Technology', 'Social Media', 'Content Writing', 'Fundraising', 'Event Management', 'Research', 'Other'] %}
                    <option value="{{ d }}">{{ d }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Duration *</label>
                <select name="duration" class="form-select" required>
                    <option value="">Select duration...</option>
                    <option value="1 Month">1 Month</option>
                    <option value="2 Months">2 Months</option>
                    <option value="3 Months">3 Months</option>
                    <option value="6 Months">6 Months</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Why do you want to intern with us? *</label>
                <textarea name="motivation" class="form-control" rows="4" placeholder="Share your motivation and goals..." required></textarea>
            </div>
            <div class="mb-4">
                <label class="form-label">Relevant Experience</label>
                <textarea name="experience" class="form-control" rows="3" placeholder="Previous volunteering, internship, or relevant projects..."></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn np-btn-primary flex-fill"><i class="bi bi-send me-2"></i>Submit Application</button>
                <a href="{{ url_for('internships') }}" class="btn btn-outline-secondary flex-fill">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
