{% extends 'base.html' %}
{% block title %}Create Event - NayePankh{% endblock %}
{% block content %}
<div class="auth-wrapper d-flex align-items-center justify-content-center py-5">
    <div class="auth-card p-5" style="max-width:560px;width:100%">
        <h4 class="mb-4"><i class="bi bi-calendar-plus text-success me-2"></i>Create New Event</h4>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Event Title *</label>
                <input type="text" name="title" class="form-control" placeholder="e.g. Tree Plantation Drive" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3" placeholder="Event details..."></textarea>
            </div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Date *</label>
                    <input type="date" name="date" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Max Volunteers</label>
                    <input type="number" name="max_volunteers" class="form-control" value="50" min="1">
                </div>
            </div>
            <div class="mb-4 mt-3">
                <label class="form-label">Location</label>
                <div class="input-group np-input-group">
                    <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                    <input type="text" name="location" class="form-control" placeholder="City, State">
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn np-btn-primary flex-fill">Create Event</button>
                <a href="{{ url_for('events') }}" class="btn btn-outline-secondary flex-fill">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
