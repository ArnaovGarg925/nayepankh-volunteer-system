{% extends 'base.html' %}
{% block title %}Login - NayePankh{% endblock %}
{% block content %}
<div class="auth-wrapper d-flex align-items-center justify-content-center py-5">
    <div class="auth-card p-5">
        <div class="text-center mb-4">
            <div class="auth-icon mx-auto mb-3"><i class="bi bi-feather2 fs-2 text-success"></i></div>
            <h2 class="fw-bold">Welcome Back</h2>
            <p class="text-muted">Sign in to your NayePankh account</p>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group np-input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group np-input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required id="passInput">
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePass()"><i class="bi bi-eye" id="eyeIcon"></i></button>
                </div>
            </div>
            <button type="submit" class="btn np-btn-primary w-100 btn-lg">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>
        <div class="text-center mt-4">
            <span class="text-muted">Don't have an account? </span>
            <a href="{{ url_for('register') }}" class="text-success fw-semibold">Register here</a>
        </div>
        <div class="text-center mt-2">
            <small class="text-muted">Admin: admin@nayepankh.org / admin123</small>
        </div>
    </div>
</div>
<script>
function togglePass(){
    const inp=document.getElementById('passInput');
    const ic=document.getElementById('eyeIcon');
    if(inp.type==='password'){inp.type='text';ic.className='bi bi-eye-slash';}
    else{inp.type='password';ic.className='bi bi-eye';}
}
</script>
{% endblock %}
